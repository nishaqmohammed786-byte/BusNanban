{% extends 'base.html' %}

{% block title %}BusNanban - Find Your Chennai Bus{% endblock %}

{% block content %}
<div class="hero-section">
    <div class="hero-text">
        <h1>Navigate Chennai Like a Pro 🗺️</h1>
    </div>

    <div class="card search-card">
        <h2>Find Your Bus Nanban</h2>
        <form action="/search/bus" method="GET" class="search-form">
            
            <!-- From Location Input Group -->
            <div class="form-group">
                <label for="source">From (Starting Stop)</label>
                <div class="input-wrapper" style="display: flex; gap: 8px; align-items: center;">
                    <div style="position: relative; flex: 1; display: flex; align-items: center;">
                        <span class="input-icon" style="position: absolute; left: 12px; z-index: 5;">📍</span>
                        <input type="text" id="source" name="source" placeholder>
                    </div>
                    <!-- Live Location Button -->
                    <button type="button" onclick="getUserLocation()" title="Use Live Location" style="padding: 12px 16px; background-color: #007bff; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; white-space: nowrap; transition: background 0.2s;">
                        🛰️ Live
                    </button>
                </div>
                <small id="location-status" style="display: block; font-size: 0.75rem; color: #666; margin-top: 4px; min-height: 15px;"></small>
            </div>

            <!-- To Location Input Group -->
            <div class="form-group">
                <label for="destination">To (Destination Stop)</label>
                <div class="input-wrapper" style="position: relative; display: flex; align-items: center;">
                    <span class="input-icon" style="position: absolute; left: 12px;">🏁</span>
                    <input type="text" id="destination" name="destination" placeholder>
                </div>
            </div>

            <!-- Preferred Bus Comfort Dropdown -->
            <div class="form-group">
                <label for="bus_type">Preferred Bus Comfort</label>
                <div class="input-wrapper" style="position: relative; display: flex; align-items: center;">
                    <span class="input-icon" style="position: absolute; left: 12px;">✨</span>
                    <select id="bus_type" name="bus_type" style="padding-left: 40px; width: 100%; box-sizing: border-box;">
                        <option value="Any">Any Type</option>
                        <option value="Normal">Normal (Budget-friendly)</option>
                        <option value="Deluxe">Deluxe (Comfortable)</option>
                        <option value="AC">AC (Air-Conditioned)</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Search Available Buses 🔍</button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function getUserLocation() {
        const statusText = document.getElementById('location-status');
        const sourceField = document.getElementById('source');

        if (!navigator.geolocation) {
            statusText.style.color = "#dc3545";
            statusText.innerText = "❌ Geolocation is not supported by your browser.";
            return;
        }

        statusText.style.color = "#007bff";
        statusText.innerText = "⏳ Pinpointing coordinates...";

        navigator.geolocation.getCurrentPosition(
            async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;

                statusText.innerText = "🔄 Resolving street address...";

                try {
                    // Reverse geocoding via OpenStreetMap's Nominatim API
                    const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                    const data = await response.json();
                    
                    if (data && data.address) {
                        // Priority order for matching local Chennai areas/suburbs smoothly
                        const locationName = data.address.suburb || data.address.neighbourhood || data.address.city_district || data.address.town || data.address.city || "Current Location";
                        sourceField.value = locationName;
                        statusText.style.color = "#28a745";
                        statusText.innerText = "✅ Location updated successfully!";
                    } else {
                        sourceField.value = `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
                        statusText.innerText = "✅ Location set (Coordinates used).";
                    }
                } catch (error) {
                    sourceField.value = `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
                    statusText.style.color = "#ffc107";
                    statusText.innerText = "⚠️ Location set (Address lookup failed).";
                }
            },
            (error) => {
                statusText.style.color = "#dc3545";
                switch(error.code) {
                    case error.PERMISSION_DENIED:
                        statusText.innerText = "❌ Permission denied. Please enable location tracking.";
                        break;
                    default:
                        statusText.innerText = "❌ Unable to fetch current location coordinates.";
                }
            }
        );
    }
</script>
{% endblock %}
